<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="SPmate">
    <title>SP Mate</title>
    <style>
        :root {
            --bg: #000;
            --card: #1c1c1e;
            --border: #2c2c2e;
            --accent: #4da6ff;
            --accent-dark: #2f5496;
            --text: #fff;
            --sub: #8e8e93;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 30px;
            opacity: 1;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #splash.hide {
            opacity: 0;
            visibility: hidden;
        }
        .logo-container {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .logo-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 100px;
            border: 2px solid transparent;
            border-top-color: #4da6ff;
            border-right-color: #4da6ff;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }
        .logo-ring:nth-child(2) {
            width: 80px;
            height: 80px;
            top: 10px;
            left: 10px;
            border-top-color: #2f5496;
            border-left-color: #2f5496;
            border-right-color: transparent;
            animation-direction: reverse;
            animation-duration: 2s;
        }
        .logo-ring:nth-child(3) {
            width: 60px;
            height: 60px;
            top: 20px;
            left: 20px;
            border-bottom-color: #4da6ff;
            border-left-color: #4da6ff;
            border-top-color: transparent;
            animation-duration: 1.2s;
        }
        .logo-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
            font-weight: 900;
            color: #4da6ff;
            letter-spacing: 2px;
            animation: glow 1.5s ease-in-out infinite;
        }
        .splash-sub {
            font-size: 11px;
            color: #4da6ff;
            margin-top: 30px;
            letter-spacing: 4px;
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
            animation-delay: 1s;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px rgba(77,166,255,0.3); }
            50% { text-shadow: 0 0 30px rgba(77,166,255,0.8), 0 0 60px rgba(77,166,255,0.3); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 0.7; transform: translateY(0); }
        }

        .illustration {
            text-align: center;
            margin: 4px 0 10px;
        }
        .illustration svg {
            width: 100px;
            height: 85px;
        }
        .header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 3px;
        }
        .header .version {
            font-size: 12px;
            color: var(--sub);
        }
        .tabs {
            display: flex;
            padding: 10px 12px;
            gap: 6px;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 9;
            overflow-x: auto;
        }
        .tab {
            flex: 1;
            min-width: 70px;
            padding: 10px 6px;
            border-radius: 10px;
            background: var(--card);
            color: var(--sub);
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .tab.active {
            background: var(--accent-dark);
            color: #fff;
            border-color: var(--accent);
            font-weight: 700;
        }
        .content {
            padding: 14px;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .card h3 {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 2px;
            text-align: center;
            font-weight: 600;
        }
        .input-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }
        .input-row label {
            flex: 1;
            font-size: 12px;
            color: var(--sub);
        }
        .input-row input,
        .input-row select {
            width: 85px;
            padding: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            text-align: center;
        }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            margin-bottom: 12px;
            width: 100%;
        }
        .btn {
            flex: 1;
            padding: 13px 10px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            color: white;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-calc {
            background: var(--accent-dark);
        }
        .btn-clear {
            background: #555;
        }
        .btn-single {
            max-width: 200px;
            margin: 0 auto;
        }
        .result-box {
            background: var(--card);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .result-box h3 {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-line {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        .result-label {
            color: var(--sub);
        }
        .result-value {
            font-weight: 600;
            color: var(--accent);
        }
        .formula-text {
            font-size: 10px;
            color: var(--sub);
            margin-top: 8px;
            font-style: italic;
        }
        .speed-result {
            background: rgba(77, 166, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
        }
        .mode-switch {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }
        .mode-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            background: var(--card);
            color: var(--sub);
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .mode-btn.active {
            background: var(--accent-dark);
            color: #fff;
            border-color: var(--accent);
        }
        .footer {
            text-align: center;
            padding: 12px;
            font-size: 9px;
            color: #3a3a3a;
            margin-top: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">
        <div class="logo-container">
            <div class="logo-ring"></div>
            <div class="logo-ring"></div>
            <div class="logo-ring"></div>
            <div class="logo-text">SP</div>
        </div>
        <div class="splash-sub">ИНЖЕНЕРНЫЕ РАСЧЁТЫ</div>
    </div>

    <div class="header">
        <h1>SP MATE</h1>
        <span class="version">v2.3</span>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">Трубное</div>
        <div class="tab" onclick="switchTab(1)">Кольцевое</div>
        <div class="tab" onclick="switchTab(2)">Гидростатика</div>
        <div class="tab" onclick="switchTab(3)">Прокачка</div>
    </div>

    <div class="content">
        <!-- Трубное -->
        <div class="page active" id="page0">
            <div class="card">
                <h3>ОБЪЕМ ТРУБНОГО ПРОСТРАНСТВА</h3>
                <div class="illustration">
                    <svg viewBox="0 0 100 85" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="25" y="8" width="50" height="68" rx="6" stroke="#4da6ff" stroke-width="2" fill="none"/>
                        <rect x="32" y="8" width="36" height="68" rx="4" fill="#4da6ff" opacity="0.08"/>
                        <text x="50" y="48" fill="#4da6ff" font-size="11" font-weight="700" text-anchor="middle">V</text>
                        <text x="18" y="14" fill="#8e8e93" font-size="8">D</text>
                        <text x="78" y="48" fill="#8e8e93" font-size="8">L</text>
                    </svg>
                </div>
                <div class="input-row">
                    <label>Диаметр трубы (мм):</label>
                    <input type="number" id="tubeD" value="140" step="any">
                </div>
                <div class="input-row">
                    <label>Длина (м):</label>
                    <input type="number" id="tubeL" value="3000" step="any">
                </div>
                <div class="btn-row">
                    <button class="btn btn-calc" onclick="calcTube()">РАССЧИТАТЬ</button>
                    <button class="btn btn-clear" onclick="clearResult('tubeResult')">ОЧИСТИТЬ</button>
                </div>
                <div class="result-box" id="tubeResult">
                    <h3>РЕЗУЛЬТАТ</h3>
                    <div id="tubeResultContent"></div>
                </div>
            </div>
        </div>

        <!-- Кольцевое -->
        <div class="page" id="page1">
            <div class="card">
                <h3>ОБЪЕМ КОЛЬЦЕВОГО ПРОСТРАНСТВА</h3>
                <div class="illustration">
                    <svg viewBox="0 0 100 85" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="20" y="8" width="60" height="68" rx="8" stroke="#4da6ff" stroke-width="2" fill="none"/>
                        <rect x="32" y="8" width="36" height="68" rx="6" stroke="#2f5496" stroke-width="1.5" fill="none" stroke-dasharray="4 2"/>
                        <rect x="36" y="8" width="28" height="68" rx="4" fill="#4da6ff" opacity="0.06"/>
                        <text x="50" y="48" fill="#4da6ff" font-size="9" font-weight="600" text-anchor="middle">Кольцо</text>
                    </svg>
                </div>
                <div class="input-row">
                    <label>Внутренняя труба (мм):</label>
                    <input type="number" id="innerD" value="140" step="any">
                </div>
                <div class="input-row">
                    <label>Внешняя труба (мм):</label>
                    <input type="number" id="outerD" value="160" step="any">
                </div>
                <div class="input-row">
                    <label>Длина (м):</label>
                    <input type="number" id="annL" value="3000" step="any">
                </div>
                <div class="btn-row">
                    <button class="btn btn-calc" onclick="calcAnnular()">РАССЧИТАТЬ</button>
                    <button class="btn btn-clear" onclick="clearResult('annResult')">ОЧИСТИТЬ</button>
                </div>
                <div class="result-box" id="annResult">
                    <h3>РЕЗУЛЬТАТ</h3>
                    <div id="annResultContent"></div>
                </div>
            </div>
        </div>

        <!-- Гидростатика -->
        <div class="page" id="page2">
            <div class="card">
                <h3>ГИДРОСТАТИЧЕСКОЕ ДАВЛЕНИЕ</h3>
                <div class="illustration">
                    <svg viewBox="0 0 100 85" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="38" y="4" width="24" height="72" rx="4" stroke="#4da6ff" stroke-width="2" fill="none"/>
                        <rect x="40" y="20" width="20" height="50" rx="2" fill="#4da6ff" opacity="0.12"/>
                        <text x="50" y="50" fill="#4da6ff" font-size="8" font-weight="600" text-anchor="middle">P</text>
                        <text x="50" y="85" fill="#8e8e93" font-size="7" text-anchor="middle">Забой</text>
                    </svg>
                </div>
                <div class="input-row">
                    <label>Глубина (м):</label>
                    <input type="number" id="depth" value="3000" step="any">
                </div>
                <div class="input-row">
                    <label>Плотность (г/см³):</label>
                    <input type="number" id="density" value="1.0" step="any">
                </div>
                <div class="btn-row">
                    <button class="btn btn-calc btn-single" onclick="calcHydro()">РАССЧИТАТЬ</button>
                    <button class="btn btn-clear btn-single" onclick="clearResult('hydroResult')">ОЧИСТИТЬ</button>
                </div>
                <div class="result-box" id="hydroResult">
                    <h3>РЕЗУЛЬТАТ</h3>
                    <div id="hydroResultContent"></div>
                </div>
            </div>
        </div>

        <!-- Прокачка -->
        <div class="page" id="page3">
            <div class="card">
                <h3>ПРОКАЧКА</h3>
                <div class="illustration">
                    <svg viewBox="0 0 100 85" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="20" y="4" width="60" height="72" rx="4" stroke="#4da6ff" stroke-width="2" fill="none"/>
                        <circle cx="50" cy="60" r="6" fill="#4da6ff" opacity="0.3"/>
                        <circle cx="50" cy="60" r="3" fill="#4da6ff"/>
                        <path d="M50 10 L45 18 L55 18 Z" fill="#4da6ff" opacity="0.6"/>
                        <text x="50" y="36" fill="#4da6ff" font-size="7" text-anchor="middle">→</text>
                        <text x="50" y="85" fill="#8e8e93" font-size="7" text-anchor="middle">Пробка</text>
                    </svg>
                </div>
                <div class="mode-switch">
                    <div class="mode-btn active" onclick="switchMode(0)">По глубине</div>
                    <div class="mode-btn" onclick="switchMode(1)">По объему</div>
                </div>
                <div id="modeDepth">
                    <div class="input-row">
                        <label>Глубина (м):</label>
                        <input type="number" id="plugDepth" value="3000" step="any">
                    </div>
                    <div class="input-row">
                        <label>Диаметр трубы (мм):</label>
                        <input type="number" id="plugTubeD" value="140" step="any">
                    </div>
                    <div class="input-row">
                        <label>Расход (л/с):</label>
                        <input type="number" id="flowRate" value="8" step="any">
                    </div>
                </div>
                <div id="modeVolume" style="display:none">
                    <div class="input-row">
                        <label>Объем (м³):</label>
                        <input type="number" id="plugVol" value="30" step="any">
                    </div>
                    <div class="input-row">
                        <label>Расход (л/с):</label>
                        <input type="number" id="flowRate2" value="8" step="any">
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-calc" onclick="calcPlug()">РАССЧИТАТЬ</button>
                    <button class="btn btn-clear" onclick="clearResult('plugResult')">ОЧИСТИТЬ</button>
                </div>
                <div class="result-box" id="plugResult">
                    <h3>РЕЗУЛЬТАТ</h3>
                    <div id="plugResultContent"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">product by Pavel Samkov</div>

    <script>
        let currentMode = 0;

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').classList.add('hide');
            }, 2200);
        });

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
            document.querySelectorAll('.page').forEach((p, i) => p.classList.toggle('active', i === n));
        }

        function switchMode(n) {
            currentMode = n;
            document.querySelectorAll('.mode-btn').forEach((b, i) => b.classList.toggle('active', i === n));
            document.getElementById('modeDepth').style.display = n === 0 ? 'block' : 'none';
            document.getElementById('modeVolume').style.display = n === 1 ? 'block' : 'none';
        }

        function calcTube() {
            const d = parseFloat(document.getElementById('tubeD').value);
            const l = parseFloat(document.getElementById('tubeL').value);
            if (isNaN(d) || isNaN(l)) { alert('Заполни все поля!'); return; }
            const r = d / 2000;
            const vol = Math.PI * r * r * l;
            document.getElementById('tubeResultContent').innerHTML =
                '<div class="result-line"><span class="result-label">Площадь сечения:</span><span class="result-value">' + (Math.PI * r * r).toFixed(4) + ' м²</span></div>' +
                '<div class="result-line"><span class="result-label">Объем:</span><span class="result-value">' + vol.toFixed(2) + ' м³</span></div>' +
                '<div class="formula-text">Диаметр: ' + d + ' мм | Длина: ' + l + ' м</div>';
            document.getElementById('tubeResult').style.display = 'block';
        }

        function calcAnnular() {
            const id = parseFloat(document.getElementById('innerD').value);
            const od = parseFloat(document.getElementById('outerD').value);
            const l = parseFloat(document.getElementById('annL').value);
            if (isNaN(id) || isNaN(od) || isNaN(l)) { alert('Заполни все поля!'); return; }
            if (od <= id) { alert('Внешний диаметр должен быть больше внутреннего!'); return; }
            const ir = id / 2000, or_ = od / 2000;
            const innerArea = Math.PI * ir * ir, outerArea = Math.PI * or_ * or_;
            const annularArea = outerArea - innerArea;
            document.getElementById('annResultContent').innerHTML =
                '<div class="result-line"><span class="result-label">Объем кольца:</span><span class="result-value">' + (annularArea * l).toFixed(2) + ' м³</span></div>' +
                '<div class="result-line"><span class="result-label">Объем внутр. трубы:</span><span class="result-value">' + (innerArea * l).toFixed(2) + ' м³</span></div>' +
                '<div class="result-line"><span class="result-label">Общий объем (по внеш.):</span><span class="result-value">' + (outerArea * l).toFixed(2) + ' м³</span></div>' +
                '<div class="formula-text">Внутр: ' + id + ' мм | Внеш: ' + od + ' мм | Длина: ' + l + ' м</div>';
            document.getElementById('annResult').style.display = 'block';
        }

        function calcHydro() {
            const depth = parseFloat(document.getElementById('depth').value);
            const density = parseFloat(document.getElementById('density').value);
            if (isNaN(depth) || isNaN(density)) { alert('Заполни все поля!'); return; }
            const p = density * 1000 * 9.81 * depth / 1e6;
            document.getElementById('hydroResultContent').innerHTML =
                '<div class="result-line"><span class="result-label">Давление:</span><span class="result-value">' + p.toFixed(2) + ' МПа</span></div>' +
                '<div class="result-line"><span class="result-label">Давление:</span><span class="result-value">' + (p * 9.86923).toFixed(1) + ' атм</span></div>' +
                '<div class="formula-text">Глубина: ' + depth + ' м | Плотность: ' + density + ' г/см³</div>';
            document.getElementById('hydroResult').style.display = 'block';
        }

        function calcPlug() {
            let d, flowLS, length;
            if (currentMode === 0) {
                d = parseFloat(document.getElementById('plugTubeD').value);
                flowLS = parseFloat(document.getElementById('flowRate').value);
                length = parseFloat(document.getElementById('plugDepth').value);
                if (isNaN(d) || isNaN(flowLS) || isNaN(length)) { alert('Заполни все поля!'); return; }
            } else {
                const vol = parseFloat(document.getElementById('plugVol').value);
                flowLS = parseFloat(document.getElementById('flowRate2').value);
                if (isNaN(vol) || isNaN(flowLS)) { alert('Заполни все поля!'); return; }
                d = 140;
                const r = d / 2000;
                length = vol / (Math.PI * r * r);
            }
            const r = d / 2000;
            const area = Math.PI * r * r;
            const speed = (flowLS / 1000) / area;
            const timeSec = length / speed;
            const totalMinutes = timeSec / 60;
            const hh = Math.floor(totalMinutes / 60);
            const mm = Math.round(totalMinutes % 60);
            const volTotal = area * length;
            let h = '';
            h += '<div class="result-line"><span class="result-label">Скорость потока:</span><span class="result-value">' + speed.toFixed(2) + ' м/с</span></div>' +
                 '<div class="result-line"><span class="result-label">Время прокачки:</span><span class="result-value">' + hh + ' ч ' + mm + ' мин</span></div>' +
                 '<div class="result-line"><span class="result-label">Объем трубы:</span><span class="result-value">' + volTotal.toFixed(2) + ' м³</span></div>' +
                 '<div class="speed-result">' + (currentMode === 0 ? 'Пробка на ' + length.toFixed(0) + ' м через ' + hh + ' ч ' + mm + ' мин' : volTotal.toFixed(2) + ' м³ за ' + hh + ' ч ' + mm + ' мин') + '</div>' +
                 '<div class="formula-text">Расход: ' + flowLS + ' л/с</div>';
            document.getElementById('plugResultContent').innerHTML = h;
            document.getElementById('plugResult').style.display = 'block';
        }

        function clearResult(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>
</body>
</html>
